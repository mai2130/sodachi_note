{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ポートフォリオ</title>
    <link rel="stylesheet" href="{% static 'portfolio/styles.css' %}">
</head>
<body>
    <main class="container">
        <h1 class="page-title">そだちノート</h1>

        <section class ="card">
            <figure class="phone-gallery">
                <div class="phone-shot">
                    <img src="{% static 'portfolio/home.png' %}" alt="ホーム画面">
                </div>
                <div class="phone-shot">
                    <img src="{% static 'portfolio/board.png' %}" alt="Q&A掲示板">
                </div>
                <div class="phone-shot">
                    <img src="{% static 'portfolio/notice.png' %}" alt="園からのおたより">
                </div> 
            </figure>

                <p class="summary">
                    そだちノートは、園と家庭を繋げる<br>
                    子どもの成長と生活を記録するアプリです。<br>
                    園からの連絡事項を確認したり<br>
                    掲示板を通じて在園児の保護者同士で<br>
                    情報交換を行うことができます。
                </p>
                <nav class="doc-links">
                    <a href="{% static 'portfolio/kikakusho.pdf' %}" target="_blank" rel="noopener">企画書</a>
                    <a href="{% static 'portfolio/sekkeizu.pdf' %}" target="_blank" rel="noopener">画面設計図</a>
                    <a href="{% static 'portfolio/senizu.drawio.svg' %}" target="_blank" rel="noopener">画面遷移図</a>
                    <a href="{% static 'portfolio/ER.drawio.svg' %}" target="_blank" rel="noopener">ER図</a>
                </nav>
                
                <div class="cta">
                    <a class="btn-primary" href="{% url 'login' %}">アプリへ</a>
                </div>
        </section>
    </main>
</body>
</html>

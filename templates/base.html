{% load static %}
<!DOCTYPE html>
<html lang ="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}そだちノート{% endblock %}</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block head_extra %}{% endblock %}
</head>

    <header class="site-header">
        <nav class="site-nav">
            <h1 class="logo">
                <a href="{% url 'dashboard:home' %}">そだちノート</a>
            </h1>
            <div class="logout">
                <form action ="{% url 'logout' %}" method="POST" class="logout-form">
                    {% csrf_token %}
                    <button type="submit" class="link-like">
                        <i class="bi bi-box-arrow-right"></i>
                        <span>ログアウト</span>
                    </button>
                </form>             
            </div>
        </nav>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>
    
    {% block footer %}
    <footer class="site-footer">
        <nav class="footer-nav">
            <a class="footer-item" href="{% url 'dashboard:home' %}">
            <i class="bi bi-emoji-smile"></i>
            <span class="label">記録</span>
            </a>

            <a class="footer-item" href="{% url 'notices:list' %}">
            <i class="bi bi-envelope"></i>
            <span class="label">おたより</span>            
            </a>

            <a class="footer-item" href="{% url 'boards:list' %}">
            <i class="bi bi-wechat"></i>
            <span class="label">掲示板</span>
            </a>

            <a class="footer-item"
            href="{% if request.user.role == request.user.Role.FACILITY %}
            {% url 'invites:account_list' %}
            {% else %}
            {% url 'families:info' %}
            {% endif %}">
            <i class="bi bi-people"></i>
            <span class="label">アカウント</span>
            </a>

            
            <a class="footer-item"
                href="{% if request.user.role == request.user.Role.FACILITY %}
                {% url 'nurseries:nursery_mypage' %}
                {% else %}
                {% url 'accounts:child_mypage' %}
                {% endif %}">
                <i class="bi bi-person"></i>
                <span class="label">マイページ</span>
            </a>

        </nav>
    </footer>
    {% endblock %}
</body>
</html>
